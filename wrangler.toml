name = "my-memos"
main = "apps/memos/.svelte-kit/cloudflare/_sveltekit.js"
compatibility_date = "2026-05-05"
compatibility_flags = ["nodejs_compat"]
upload_source_maps = true

[vars]
BETTER_AUTH_URL = "https://memos.you-find.me"
CF_ACCOUNT_ID = "fb71c4eceaf623ae1b19b8b37d7a38cf"
CF_GATEWAY_NAME = "default"
AI_GATEWAY_PROVIDER_SLUG = "siliconflow"

[assets]
directory = "apps/memos/.svelte-kit/cloudflare"
binding = "ASSETS"

[[d1_databases]]
binding = "DB"
database_name = "my-memos"
database_id = "02a94452-aeeb-4c5e-8846-6750347f6cad"
migrations_dir = "apps/memos/migrations"

[[kv_namespaces]]
binding = "MEMOS_CACHE"
id = "5f04d490f46b4459b32d8e735f95dfd5"

[[r2_buckets]]
binding = "MEMOS_BUCKET"
bucket_name = "cherry-studio"
remote = true

[[migrations]]
tag = "v2"
deleted_classes = ["ChatAgent"]

[observability]
[observability.logs]
enabled = true
invocation_logs = true
